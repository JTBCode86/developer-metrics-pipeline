version: '3.8'

networks:
  metrics_network:
    driver: bridge

services:
  localstack:
    container_name: metrics-pipeline-localstack
    image: localstack/localstack:3.4
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./src/infra/localstack:/etc/localstack/init/ready.d
      - ./src/scripts:/scripts
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - metrics_network

  processor-service:
    container_name: metrics-processor
    build:
      context: ./src
      dockerfile: services/Processor/Dockerfile
    ports:
      - "5000:8080" # Porta 5000 exposta para o seu curl
    environment:
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=us-east-1
      - AWS_ACCESS_KEY_ID=mock_key
      - AWS_SECRET_ACCESS_KEY=mock_secret
      - AWS__QueueUrl=http://localstack:4566/000000000000/raw-events # Nova config para o Program.cs
      - QueueSettings__RawEventsQueueName=raw-events
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - metrics_network

  aggregator-service:
    container_name: metrics-aggregator
    build:
      context: ./src
      dockerfile: services/Aggregator/Dockerfile
    ports:
      - "5001:8080" # Porta 5001 para a API do Aggregator
    environment:
      - AWS__ServiceURL=http://localstack:4566
      - AWS__Region=us-east-1
      - AWS_ACCESS_KEY_ID=mock_key
      - AWS_SECRET_ACCESS_KEY=mock_secret
      - QueueSettings__ProcessedEventsQueueName=raw-events
    depends_on:
      localstack:
        condition: service_healthy
    networks:
      - metrics_network